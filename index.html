<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="請求書">
<meta name="theme-color" content="#0a0a1a">
<title>請求書作成</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #fff; min-height: 100vh; }
.container { padding: 16px; max-width: 480px; margin: auto; }
.lock-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
.lock-icon { font-size: 48px; margin-bottom: 16px; }
.lock-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; text-shadow: 0 0 10px rgba(29,158,117,0.8); }
.lock-sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 24px; }
.lock-input { width: 100%; max-width: 280px; padding: 14px; border: 1px solid rgba(29,158,117,0.4); border-radius: 12px; background: rgba(255,255,255,0.08); color: #fff; font-size: 16px; text-align: center; margin-bottom: 12px; }
.lock-btn { width: 100%; max-width: 280px; padding: 14px; border-radius: 12px; border: none; background: #1D9E75; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
.lock-error { color: #ef9a9a; font-size: 13px; margin-top: 10px; min-height: 18px; }
.app { display: none; }
.app.show { display: block; }
.page { display: none; }
.page.active { display: block; }
.top-title { text-align: center; padding: 16px 0 12px; }
.top-title .badge { display: inline-block; border: 1px solid #1D9E75; color: #1D9E75; font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 99px; letter-spacing: 0.1em; margin-bottom: 6px; text-shadow: 0 0 6px #1D9E75; box-shadow: 0 0 8px rgba(29,158,117,0.4); }
.top-title .title { font-size: 16px; font-weight: 700; text-shadow: 0 0 10px rgba(29,158,117,0.8); }
.top-cards { display: flex; flex-direction: column; gap: 12px; }
.top-card { background: rgba(255,255,255,0.05); border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); padding: 20px; display: flex; align-items: center; gap: 16px; cursor: pointer; }
.top-card:active { opacity: 0.75; }
.top-card .icon { width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.top-card .icon.green { background: rgba(29,158,117,0.2); }
.top-card .icon.gray { background: rgba(255,255,255,0.08); }
.top-card .card-text h3 { font-size: 16px; font-weight: 600; margin-bottom: 3px; }
.top-card .card-text p { font-size: 12px; color: rgba(255,255,255,0.4); }
.top-card .arr { margin-left: auto; color: rgba(255,255,255,0.3); font-size: 22px; }
h2 { font-size: 17px; font-weight: 600; margin-bottom: 16px; padding-top: 8px; }
.btn-back { background: none; border: none; color: #1D9E75; font-size: 15px; font-weight: 600; padding: 8px 0; margin-bottom: 12px; cursor: pointer; }
.section { margin-bottom: 14px; }
label { display: block; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 5px; font-weight: 500; }
input { width: 100%; padding: 13px 14px; border: 1px solid rgba(29,158,117,0.3); border-radius: 12px; background: rgba(255,255,255,0.06); color: #fff; font-size: 16px; font-family: inherit; }
input:focus { outline: none; border-color: #1D9E75; }
.rate-item { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
.rate-name { flex: 1; font-size: 15px; font-weight: 500; }
.rate-input { width: 130px; }
.btn { width: 100%; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 15px; font-weight: 600; border: none; background: #1D9E75; color: #fff; margin-top: 8px; }
.btn:active { opacity: 0.8; }
.btn.sub { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); }
.loading { text-align: center; padding: 40px 0; color: #1D9E75; font-size: 14px; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 12px 28px; border-radius: 99px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; color: #fff; background: #1D9E75; }
.toast.show { opacity: 1; }
.placeholder { text-align: center; padding: 50px 20px; color: rgba(255,255,255,0.4); font-size: 14px; line-height: 1.8; }
.month-selector { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 16px; }
.nav-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(29,158,117,0.4); border-radius: 10px; width: 40px; height: 40px; cursor: pointer; font-size: 18px; color: #1D9E75; }
.month-label { font-size: 17px; font-weight: 600; min-width: 120px; text-align: center; }
.site-group { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
.site-name { font-size: 15px; font-weight: 700; color: #4ecca3; margin-bottom: 10px; }
.detail-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.detail-label { flex: 1; font-size: 13px; }
.detail-qty { width: 54px; }
.detail-price { width: 90px; }
.detail-amount { width: 90px; text-align: right; font-size: 13px; font-weight: 600; color: #4ecca3; }
.detail-row input { padding: 8px; font-size: 14px; text-align: right; }
.material-add { font-size: 12px; color: #1D9E75; cursor: pointer; padding: 6px 0; }
.summary { background: rgba(29,158,117,0.1); border: 1px solid rgba(29,158,117,0.3); border-radius: 12px; padding: 14px 16px; margin-top: 16px; }
.summary-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
.summary-row.total { border-top: 1px solid rgba(29,158,117,0.3); margin-top: 8px; padding-top: 10px; font-size: 16px; }
.summary-row.total .v { color: #4ecca3; font-weight: 700; }
.del-x { background: none; border: none; color: #ef9a9a; font-size: 16px; cursor: pointer; padding: 4px; }
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">請求書作成ツール</div>
  <div class="lock-sub">パスワードを入力してください</div>
  <input type="password" class="lock-input" id="pwInput" placeholder="パスワード" onkeydown="if(event.key==='Enter')checkPassword()">
  <button class="lock-btn" onclick="checkPassword()">開く</button>
  <div class="lock-error" id="lockError"></div>
</div>

<div class="app" id="app">
  <div class="page active" id="topPage">
    <div class="container">
      <div class="top-title">
        <div class="badge">⚡ ELECTRICAL WORK</div>
        <div class="title">請求書作成ツール</div>
      </div>
      <div class="top-cards">
        <div class="top-card" onclick="startCreate()">
          <div class="icon green">📄</div>
          <div class="card-text">
            <h3>請求書を作成</h3>
            <p>月を選んで請求書を作成</p>
          </div>
          <div class="arr">›</div>
        </div>
        <div class="top-card" onclick="showRates()">
          <div class="icon gray">💰</div>
          <div class="card-text">
            <h3>人工単価の設定</h3>
            <p>作業者ごとの単価を登録</p>
          </div>
          <div class="arr">›</div>
        </div>
      </div>
    </div>
  </div>

  <div class="page" id="ratePage">
    <div class="container">
      <button class="btn-back" onclick="showPage('topPage')">← 戻る</button>
      <h2>人工単価の設定</h2>
      <div id="rateList"><div class="loading">読み込み中...</div></div>
      <button class="btn" onclick="saveRates()">単価を保存</button>
    </div>
  </div>

  <div class="page" id="createPage">
    <div class="container">
      <button class="btn-back" onclick="showPage('topPage')">← 戻る</button>
      <h2>請求書を作成</h2>
      <div class="month-selector">
        <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
        <div class="month-label" id="monthLabel"></div>
        <button class="nav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div id="createContent"><div class="loading">読み込み中...</div></div>
    </div>
  </div>

  <div class="page" id="infoPage">
    <div class="container">
      <button class="btn-back" onclick="showPage('createPage')">← 戻る</button>
      <h2>請求書情報の入力</h2>
      <div class="section"><label>請求月</label><input type="text" id="invMonth" placeholder="例：5月"></div>
      <div class="section"><label>発行日</label><input type="text" id="invDate" placeholder="例：2026年5月31日"></div>
      <div class="section"><label>会社名</label><input type="text" id="cName" placeholder="例：株式会社〇〇"></div>
      <div class="section"><label>郵便番号</label><input type="text" id="cZip" placeholder="例：135-0016"></div>
      <div class="section"><label>住所</label><input type="text" id="cAddr" placeholder="例：東京都江東区〇〇"></div>
      <div class="section"><label>担当者</label><input type="text" id="cPerson" placeholder="例：山田 太郎"></div>
      <div class="section"><label>Tel</label><input type="text" id="cTel" placeholder="例：03-0000-0000"></div>
      <div class="section"><label>mail</label><input type="text" id="cMail" placeholder="例：info@example.com"></div>
      <div class="section"><label>インボイス番号（Tの後ろ）</label><input type="text" id="cInv" placeholder="例：123456789"></div>
      <div class="section"><label>銀行名</label><input type="text" id="bName" placeholder="例：〇〇銀行"></div>
      <div class="section"><label>支店</label><input type="text" id="bBranch" placeholder="例：法人営業部"></div>
      <div class="section"><label>預金種別</label><input type="text" id="bType" placeholder="例：普通"></div>
      <div class="section"><label>口座番号</label><input type="text" id="bNum" placeholder="例：1234567"></div>
      <div class="section"><label>口座名義</label><input type="text" id="bHolder" placeholder="例：カ）〇〇"></div>
      <button class="btn" onclick="generatePDF()">請求書をプレビュー</button>
    </div>
  </div>
</div>

<div id="printArea" style="display:none;"></div>
<div class="toast" id="toast"></div>

<script>
const PASSWORD = 'denki2026';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyFkpTdMK815NKHOgawnBzSs6CYLKudXZMunQsD2aBZG0d6FsdDZWmWIwhuii7S-AEy/exec';

let workers = [];
let rates = {};
let allReports = [];
let current = new Date();
let invoiceItems = [];

function checkPassword() {
  const input = document.getElementById('pwInput').value;
  if (input === PASSWORD) {
    sessionStorage.setItem('invoice_unlocked', 'yes');
    showApp();
  } else {
    document.getElementById('lockError').textContent = 'パスワードが違います';
    document.getElementById('pwInput').value = '';
  }
}

function showApp() {
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('app').classList.add('show');
}

if (sessionStorage.getItem('invoice_unlocked') === 'yes') showApp();

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

async function showRates() {
  showPage('ratePage');
  document.getElementById('rateList').innerHTML = '<div class="loading">読み込み中...</div>';
  try {
    const [wRes, rRes] = await Promise.all([
      fetch(GAS_URL + '?type=workers'),
      fetch(GAS_URL + '?type=rates')
    ]);
    const wData = await wRes.json();
    const rData = await rRes.json();
    if (wData.status === 'ok') workers = wData.data;
    if (rData.status === 'ok') rates = rData.data;
  } catch(e) { showToast('読み込みに失敗しました'); }
  renderRates();
}

function renderRates() {
  const el = document.getElementById('rateList');
  if (workers.length === 0) {
    el.innerHTML = '<div class="placeholder">作業者が登録されていません</div>';
    return;
  }
  el.innerHTML = workers.map(w => `
    <div class="rate-item">
      <div class="rate-name">${w}</div>
      <input type="number" class="rate-input" id="rate-${w}" value="${rates[w] || ''}" placeholder="単価">
    </div>
  `).join('');
}

async function saveRates() {
  for (const w of workers) {
    const val = document.getElementById(`rate-${w}`).value;
    if (val) {
      try { await fetch(`${GAS_URL}?type=setRate&worker=${encodeURIComponent(w)}&rate=${encodeURIComponent(val)}`); } catch(e) {}
    }
  }
  showToast('単価を保存しました');
}

async function startCreate() {
  showPage('createPage');
  document.getElementById('createContent').innerHTML = '<div class="loading">読み込み中...</div>';
  try {
    const [rRes, rateRes] = await Promise.all([
      fetch(GAS_URL + '?type=reports'),
      fetch(GAS_URL + '?type=rates')
    ]);
    const rData = await rRes.json();
    const rateData = await rateRes.json();
    if (rData.status === 'ok') allReports = rData.data;
    if (rateData.status === 'ok') rates = rateData.data;
  } catch(e) { showToast('読み込みに失敗しました'); }
  renderCreate();
}

function changeMonth(diff) {
  current = new Date(current.getFullYear(), current.getMonth() + diff, 1);
  renderCreate();
}

function renderCreate() {
  const y = current.getFullYear();
  const m = current.getMonth() + 1;
  document.getElementById('monthLabel').textContent = `${y}年${m}月`;
  const monthStr = `${y}-${String(m).padStart(2,'0')}`;
  const monthData = allReports.filter(r => String(r.date || '').startsWith(monthStr));

  if (monthData.length === 0) {
    document.getElementById('createContent').innerHTML = '<div class="placeholder">この月の日報データはありません</div>';
    return;
  }

  const siteMap = {};
  monthData.forEach(row => {
    const site = row.site || '';
    if (!siteMap[site]) siteMap[site] = { workers: {}, parking: 0, highway: 0 };
    const ws = row.workers ? String(row.workers).split('、') : [];
    ws.forEach(w => {
      w = w.trim();
      if (!w) return;
      if (!siteMap[site].workers[w]) siteMap[site].workers[w] = 0;
      siteMap[site].workers[w]++;
    });
    siteMap[site].parking += Number(row.parking) || 0;
    siteMap[site].highway += Number(row.highway) || 0;
  });

  let html = '';
  Object.entries(siteMap).forEach(([site, data]) => {
    html += `<div class="site-group"><div class="site-name">${site}</div>`;
    Object.entries(data.workers).forEach(([worker, days]) => {
      const rate = rates[worker] || 0;
      const amount = days * rate;
      html += `
        <div class="detail-row" data-site="${site}" data-type="worker" data-worker="${worker}">
          <div class="detail-label">${worker}</div>
          <input type="number" class="detail-qty" value="${days}" onchange="calcAll()">
          <input type="number" class="detail-price" value="${rate}" onchange="calcAll()">
          <div class="detail-amount">${amount.toLocaleString()}</div>
        </div>`;
    });
    html += `
      <div class="detail-row" data-site="${site}" data-type="parking">
        <div class="detail-label">駐車場代</div>
        <input type="number" class="detail-price" value="${data.parking}" onchange="calcAll()">
        <div class="detail-amount">${data.parking.toLocaleString()}</div>
      </div>`;
    html += `
      <div class="detail-row" data-site="${site}" data-type="highway">
        <div class="detail-label">高速代</div>
        <input type="number" class="detail-price" value="${data.highway}" onchange="calcAll()">
        <div class="detail-amount">${data.highway.toLocaleString()}</div>
      </div>`;
    html += `<div id="mat-${site}"></div>`;
    html += `<div class="material-add" onclick="addMaterial('${site}')">＋ 材料費を追加</div>`;
    html += `</div>`;
  });

  html += `
    <div class="summary">
      <div class="summary-row"><div>小計</div><div class="v" id="subtotal">0円</div></div>
      <div class="summary-row"><div>消費税（10%）</div><div class="v" id="tax">0円</div></div>
      <div class="summary-row total"><div>ご請求金額</div><div class="v" id="grand">0円</div></div>
    </div>
    <button class="btn" onclick="goToInfo()">次へ（請求書情報の入力）</button>
  `;

  document.getElementById('createContent').innerHTML = html;
  calcAll();
}

function addMaterial(site) {
  const container = document.getElementById(`mat-${site}`);
  const div = document.createElement('div');
  div.className = 'detail-row';
  div.setAttribute('data-site', site);
  div.setAttribute('data-type', 'material');
  div.innerHTML = `
    <input type="text" class="detail-label" style="text-align:left;" placeholder="材料費の名目">
    <input type="number" class="detail-price" placeholder="金額" onchange="calcAll()">
    <button class="del-x" onclick="this.parentElement.remove();calcAll()">✕</button>
  `;
  container.appendChild(div);
}

function calcAll() {
  let subtotal = 0;
  document.querySelectorAll('.detail-row').forEach(row => {
    const type = row.getAttribute('data-type');
    if (type === 'worker') {
      const qty = Number(row.querySelector('.detail-qty').value) || 0;
      const price = Number(row.querySelector('.detail-price').value) || 0;
      const amount = qty * price;
      row.querySelector('.detail-amount').textContent = amount.toLocaleString();
      subtotal += amount;
    } else if (type === 'parking' || type === 'highway') {
      const price = Number(row.querySelector('.detail-price').value) || 0;
      if (row.querySelector('.detail-amount')) row.querySelector('.detail-amount').textContent = price.toLocaleString();
      subtotal += price;
    } else if (type === 'material') {
      const price = Number(row.querySelector('.detail-price').value) || 0;
      subtotal += price;
    }
  });
  const tax = Math.floor(subtotal * 0.1);
  document.getElementById('subtotal').textContent = subtotal.toLocaleString() + '円';
  document.getElementById('tax').textContent = tax.toLocaleString() + '円';
  document.getElementById('grand').textContent = (subtotal + tax).toLocaleString() + '円';
}

function goToInfo() {
  invoiceItems = [];
  document.querySelectorAll('.detail-row').forEach(row => {
    const type = row.getAttribute('data-type');
    const site = row.getAttribute('data-site');
    if (type === 'worker') {
      const worker = row.getAttribute('data-worker');
      const qty = Number(row.querySelector('.detail-qty').value) || 0;
      const price = Number(row.querySelector('.detail-price').value) || 0;
      if (qty > 0) invoiceItems.push({ site, name: `${worker}（人工）`, qty, price });
    } else if (type === 'parking') {
      const price = Number(row.querySelector('.detail-price').value) || 0;
      if (price > 0) invoiceItems.push({ site, name: '駐車場代', qty: 1, price });
    } else if (type === 'highway') {
      const price = Number(row.querySelector('.detail-price').value) || 0;
      if (price > 0) invoiceItems.push({ site, name: '高速代', qty: 1, price });
    } else if (type === 'material') {
      const nameEl = row.querySelector('.detail-label');
      const name = nameEl ? nameEl.value : '材料費';
      const price = Number(row.querySelector('.detail-price').value) || 0;
      if (price > 0) invoiceItems.push({ site, name: name || '材料費', qty: 1, price });
    }
  });
  if (invoiceItems.length === 0) { showToast('明細がありません'); return; }
  showPage('infoPage');
  const m = current.getMonth() + 1;
  document.getElementById('invMonth').value = `${m}月`;
}

function generatePDF() {
  const company = {
    month: document.getElementById('invMonth').value,
    date: document.getElementById('invDate').value,
    name: document.getElementById('cName').value,
    zip: document.getElementById('cZip').value,
    addr: document.getElementById('cAddr').value,
    person: document.getElementById('cPerson').value,
    tel: document.getElementById('cTel').value,
    mail: document.getElementById('cMail').value,
    inv: document.getElementById('cInv').value,
    bName: document.getElementById('bName').value,
    bBranch: document.getElementById('bBranch').value,
    bType: document.getElementById('bType').value,
    bNum: document.getElementById('bNum').value,
    bHolder: document.getElementById('bHolder').value,
  };

  let subtotal = 0;
  invoiceItems.forEach(i => subtotal += i.qty * i.price);
  const tax = Math.floor(subtotal * 0.1);
  const grand = subtotal + tax;

  let itemRows = '';
  let currentSite = '';
  let no = 1;
  invoiceItems.forEach(item => {
    const showSite = item.site !== currentSite;
    currentSite = item.site;
    const amount = item.qty * item.price;
    itemRows += `
      <tr>
        <td style="border:1px solid #999;padding:3px 5px;text-align:center;">${no++}</td>
        <td style="border:1px solid #999;padding:3px 5px;">${showSite ? item.site : ''}</td>
        <td style="border:1px solid #999;padding:3px 5px;">${item.name}</td>
        <td style="border:1px solid #999;padding:3px 5px;text-align:center;">${item.qty}</td>
        <td style="border:1px solid #999;padding:3px 5px;text-align:right;">${item.price.toLocaleString()}</td>
        <td style="border:1px solid #999;padding:3px 5px;text-align:right;">${amount.toLocaleString()}</td>
      </tr>`;
  });
  for (let i = invoiceItems.length; i < 35; i++) {
    itemRows += `
      <tr>
        <td style="border:1px solid #999;padding:3px 5px;text-align:center;">${i+1}</td>
        <td style="border:1px solid #999;padding:3px 5px;">&nbsp;</td>
        <td style="border:1px solid #999;padding:3px 5px;"></td>
        <td style="border:1px solid #999;padding:3px 5px;"></td>
        <td style="border:1px solid #999;padding:3px 5px;"></td>
        <td style="border:1px solid #999;padding:3px 5px;"></td>
      </tr>`;
  }

  const html = `
    <div style="padding:20px;font-family:'MS Gothic',monospace;font-size:11px;color:#000;max-width:800px;margin:auto;">
      <div style="display:flex;justify-content:space-between;margin-bottom:14px;">
        <div>
          <div style="font-size:13px;font-weight:bold;">株式会社Harvest　御中</div>
          <div style="font-size:22px;font-weight:bold;margin-top:10px;">指定請求書　応援</div>
        </div>
        <div style="text-align:right;font-size:11px;">
          <div>日付け　${company.date}</div>
          <div style="margin-top:6px;font-weight:bold;">${company.name}</div>
          <div>〒${company.zip}</div>
          <div>${company.addr}</div>
          <div>担当者　${company.person}</div>
          <div>Tel　${company.tel}</div>
          <div>mail　${company.mail}</div>
          <div>インボイス　T${company.inv}</div>
        </div>
      </div>
      <div style="margin-bottom:10px;">
        <div style="font-size:14px;font-weight:bold;">御請求書</div>
        <div>${company.month}分</div>
        <div style="margin-top:6px;">ご請求金額　<span style="font-size:15px;font-weight:bold;">${grand.toLocaleString()}</span>　円　税込み</div>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:10px;">
        <thead>
          <tr style="background:#eee;">
            <th style="border:1px solid #999;padding:4px;width:30px;">No.</th>
            <th style="border:1px solid #999;padding:4px;width:130px;">現場名</th>
            <th style="border:1px solid #999;padding:4px;">項目</th>
            <th style="border:1px solid #999;padding:4px;width:50px;">数量</th>
            <th style="border:1px solid #999;padding:4px;width:80px;">単価</th>
            <th style="border:1px solid #999;padding:4px;width:90px;">合計</th>
          </tr>
        </thead>
        <tbody>
          ${itemRows}
          <tr style="background:#f5f5f5;font-weight:bold;">
            <td colspan="5" style="border:1px solid #999;padding:4px;text-align:right;">合計金額</td>
            <td style="border:1px solid #999;padding:4px;text-align:right;">${subtotal.toLocaleString()}</td>
          </tr>
          <tr>
            <td colspan="5" style="border:1px solid #999;padding:4px;text-align:right;">消費税　10%</td>
            <td style="border:1px solid #999;padding:4px;text-align:right;">${tax.toLocaleString()}</td>
          </tr>
          <tr style="background:#f5f5f5;font-weight:bold;">
            <td colspan="5" style="border:1px solid #999;padding:4px;text-align:right;">合計　ご請求金額</td>
            <td style="border:1px solid #999;padding:4px;text-align:right;">${grand.toLocaleString()}</td>
          </tr>
        </tbody>
      </table>
      <div style="margin-top:16px;font-size:11px;">
        <table>
          <tr><td style="padding:3px 12px 3px 0;">銀 行 名</td><td>${company.bName}</td></tr>
          <tr><td style="padding:3px 12px 3px 0;">支 店</td><td>${company.bBranch}</td></tr>
          <tr><td style="padding:3px 12px 3px 0;">預金種別</td><td>${company.bType}</td></tr>
          <tr><td style="padding:3px 12px 3px 0;">口座番号</td><td>${company.bNum}</td></tr>
          <tr><td style="padding:3px 12px 3px 0;">口座名義</td><td>${company.bHolder}</td></tr>
        </table>
      </div>
    </div>
  `;

  const win = window.open('', '_blank');
  win.document.write(`
    <!DOCTYPE html>
    <html><head><meta charset="UTF-8"><title>請求書</title>
    <style>body{margin:0;}@media print{body{margin:0;}}</style>
    </head><body>${html}
    <div style="text-align:center;padding:20px;" class="no-print">
      <button onclick="window.print()" style="padding:12px 32px;font-size:15px;background:#1D9E75;color:#fff;border:none;border-radius:8px;cursor:pointer;">PDFとして保存</button>
    </div>
    <style>@media print{.no-print{display:none;}}</style>
    </body></html>
  `);
  win.document.close();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
