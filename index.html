<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="請求書">
<meta name="theme-color" content="#0a0a1a">
<title>請求書作成</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #fff; min-height: 100vh; }
.container { padding: 16px; max-width: 480px; margin: auto; }
.lock-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
.lock-icon { font-size: 48px; margin-bottom: 16px; }
.lock-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; text-shadow: 0 0 10px rgba(29,158,117,0.8); }
.lock-sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 24px; }
.lock-input { width: 100%; max-width: 280px; padding: 14px; border: 1px solid rgba(29,158,117,0.4); border-radius: 12px; background: rgba(255,255,255,0.08); color: #fff; font-size: 16px; text-align: center; margin-bottom: 12px; }
.lock-btn { width: 100%; max-width: 280px; padding: 14px; border-radius: 12px; border: none; background: #1D9E75; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
.lock-btn:active { opacity: 0.8; }
.lock-error { color: #ef9a9a; font-size: 13px; margin-top: 10px; min-height: 18px; }
.app { display: none; }
.app.show { display: block; }
.top-title { text-align: center; padding: 20px 0 16px; }
.top-title .badge { display: inline-block; border: 1px solid #1D9E75; color: #1D9E75; font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 99px; letter-spacing: 0.1em; margin-bottom: 6px; text-shadow: 0 0 6px #1D9E75; box-shadow: 0 0 8px rgba(29,158,117,0.4); }
.top-title .title { font-size: 16px; font-weight: 700; text-shadow: 0 0 10px rgba(29,158,117,0.8); }
.placeholder { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.4); font-size: 14px; line-height: 1.8; }
</style>
</head>
<body>

<!-- パスワード画面 -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">請求書作成ツール</div>
  <div class="lock-sub">パスワードを入力してください</div>
  <input type="password" class="lock-input" id="pwInput" placeholder="パスワード" onkeydown="if(event.key==='Enter')checkPassword()">
  <button class="lock-btn" onclick="checkPassword()">開く</button>
  <div class="lock-error" id="lockError"></div>
</div>

<!-- アプリ本体 -->
<div class="app" id="app">
  <div class="container">
    <div class="top-title">
      <div class="badge">⚡ ELECTRICAL WORK</div>
      <div class="title">請求書作成ツール</div>
    </div>
    <div class="placeholder">
      ロック解除に成功しました！<br><br>
      ここに請求書作成機能を<br>これから追加していきます😊
    </div>
  </div>
</div>

<script>
const PASSWORD = 'denki2026';

function checkPassword() {
  const input = document.getElementById('pwInput').value;
  if (input === PASSWORD) {
    sessionStorage.setItem('invoice_unlocked', 'yes');
    showApp();
  } else {
    document.getElementById('lockError').textContent = 'パスワードが違います';
    document.getElementById('pwInput').value = '';
  }
}

function showApp() {
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('app').classList.add('show');
}

// セッション中は再入力不要
if (sessionStorage.getItem('invoice_unlocked') === 'yes') {
  showApp();
}
</script>
</body>
</html>
